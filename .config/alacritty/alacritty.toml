[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }

[terminal.shell]
program = "tmux"

[env]
TERM = "xterm-256color"

[mouse]
hide_when_typing = true

[window]
decorations_theme_variant = "Dark"

[keyboard]
bindings = [{ key = "Enter", mods = "Control", action = "ToggleFullscreen" }]

[colors.primary]
background = '#282725'
foreground = "#ffffff"
