[general]
import = [
  # fallback to dark if no current_theme.toml file
  "themes/oddsky_dark.toml",
  "current_theme.toml",
]

[font]
normal = { family = "Comic Shanns Mono", style = "Regular" }
bold = { family = "Comic Shanns Mono", style = "Bold" }
italic = { family = "Comic Shanns Mono", style = "Italic" }
bold_italic = { family = "Comic Shanns Mono", style = "Bold Italic" }
size = 12.5
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }

[terminal.shell]
program = "tmux"

# [env]
# TERM = "xterm-256color"

[mouse]
hide_when_typing = true

[window]
decorations = "None"

[keyboard]
bindings = [{ key = "Enter", mods = "Control", action = "ToggleFullscreen" }]
